<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransIT v4.4 – Fuvarszervezés (Moduláris)</title>

  <!-- CSS importok -->
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/timeline.css" />
</head>

<body>

<header class="panel">
  <div class="panel-title">🚛 Fuvarszervezés v4.4 (Moduláris)</div>
  <p style="opacity:0.7;">
    Sofőr • Vontató • Pótkocsi – idő + hely + követelmény illesztés
  </p>
</header>

<div class="container">

  <!-- FUVAR KÁRTYÁK -->
  <div class="panel">
    <div class="panel-title">📋 Fuvarfeladatok</div>
    <div id="fuvar-list">Betöltés...</div>
  </div>

  <!-- TIMELINE -->
  <div class="panel">
    <div class="panel-title">⏱️ Erőforrás Timeline</div>
    <div id="timeline-container">Betöltés...</div>
  </div>

</div>

<!-- JAVASCRIPT MODULOK -->
<script type="module">

// ADATOK
import { FUVAROK } from "./assets/js/data/fuvarok.js";
import { SOFOROK } from "./assets/js/data/soforok.js";
import { VONTATOK } from "./assets/js/data/vontatok.js";
import { POTKOCSIK } from "./assets/js/data/potkocsik.js";

// UI modulok
import { renderTimeline } from "./assets/js/ui/timeline.js";
import { renderFuvarCards } from "./assets/js/ui/fuvar-panel.js";
import { enableFuvarDrag, enableTimelineDrop } from "./assets/js/ui/dragdrop.js";

window.addEventListener("DOMContentLoaded", () => {
  
  // FUVAR KÁRTYÁK
  renderFuvarCards("fuvar-list");
  enableFuvarDrag();

  // TIMELINE
  renderTimeline("timeline-container", [
    { icon: "👤", name: "Sofőrök", list: SOFOROK },
    { icon: "🚛", name: "Vontatók", list: VONTATOK },
    { icon: "🚚", name: "Pótkocsik", list: POTKOCSIK }
  ]);
  enableTimelineDrop();

  console.log("Fuvarszervezés modul betöltve:", {
    FUVAROK, SOFOROK, VONTATOK, POTKOCSIK
  });
});

</script>

</body>
</html>
