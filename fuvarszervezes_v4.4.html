<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransIT v4.4 – Fuvarszervezés (Advanced)</title>

  <!-- CSS -->
  ./assets/css/base.css
  ./assets/css/layout.css
  ./assets/css/components.css
  ./assets/css/timeline.css

  <style>
    /* Optional + ajánlott: drag&drop highlight */
    .drop-ok {
      background: rgba(52, 199, 89, 0.25) !important;
      border: 1px solid #4cd964 !important;
    }
    .drop-bad {
      background: rgba(255, 59, 48, 0.25) !important;
      border: 1px solid #ff3b30 !important;
    }
    .menu-card.dragging {
      opacity: 0.5;
      transform: scale(0.95);
    }
  </style>

</head>

<body>

<header class="panel">
  <div class="panel-title">🚛 Fuvarszervezés v4.4 (Advanced)</div>
  <p style="opacity:0.7;">
    Sofőr • Vontató • Pótkocsi – idő + hely + relevancia illesztés
  </p>
</header>

<div class="container">

  <!-- FUVAR KÁRTYÁK -->
  <div class="panel">
    <div class="panel-title">📋 Fuvarfeladatok</div>
    <div id="fuvar-list">Betöltés...</div>
  </div>

  <!-- TIMELINE -->
  <div class="panel">
    <div class="panel-title">⏱️ Erőforrás Timeline</div>
    <div id="timeline-container">Betöltés...</div>
  </div>

</div>

<!-- JAVASCRIPT MODULOK -->
<script type="module">

/* ------------------------
   ADATOK IMPORTÁLÁSA
------------------------- */
import { FUVAROK } from "./assets/js/data/fuvarok.js";
import { SOFOROK } from "./assets/js/data/soforok.js";
import { VONTATOK } from "./assets/js/data/vontatok.js";
import { POTKOCSIK } from "./assets/js/data/potkocsik.js";

/* ------------------------
   UI MODULOK
------------------------- */
import { renderTimeline } from "./assets/js/ui/timeline.js";
import { renderFuvarCards } from "./assets/js/ui/fuvar-panel.js";
import { enableFuvarDrag, enableTimelineDrop } from "./assets/js/ui/dragdrop.js";

/* ------------------------
   OLDAL BETÖLTÉS
------------------------- */
window.addEventListener("DOMContentLoaded", () => {

  // Fuvarok kirenderelése
  renderFuvarCards("fuvar-list");
  enableFuvarDrag();

  // Timeline kirenderelése
  renderTimeline("timeline-container", [
    { icon: "👤", name: "Sofőrök", list: SOFOROK },
    { icon: "🚛", name: "Vontatók", list: VONTATOK },
    { icon: "🚚", name: "Pótkocsik", list: POTKOCSIK }
  ]);
  enableTimelineDrop();

  console.log("Fuvarszervezés v4.4 (Advanced) betöltve:", {
    FUVAROK, SOFOROK, VONTATOK, POTKOCSIK
  });
});

</script>

</body>
</html>
