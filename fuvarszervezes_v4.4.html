<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransIT v4.4 – Fuvarszervezés (Advanced)</title>

  <!-- CSS – HELYES FORMÁTUMBAN -->
  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
  <link rel="stylesheet" href="./assets/css/timeline.css" />

  <style>
    .drop-ok {
      background: rgba(52,199,89,0.25) !important;
      border: 1px solid #4cd964 !important;
    }
    .drop-bad {
      background: rgba(255,59,48,0.25) !important;
      border: 1px solid #ff3b30 !important;
    }
    .menu-card.dragging {
      opacity: 0.5;
      transform: scale(0.95);
    }
    .active-fuvar {
      box-shadow: 0 0 0 2px #4fc3f7;
    }
  </style>
</head>

<body>

<header class="panel">
  <div class="panel-title">🚛 Fuvarszervezés v4.4 (Advanced)</div>
  <p style="opacity:0.7;">
    Sofőr • Vontató • Pótkocsi – idő + hely + relevancia illesztés
  </p>
</header>

<div class="container">

  <!-- ===== FUVAR LISTA SZŰRŐK ===== -->
  <div class="panel">
    <div class="panel-title">🔍 Gyorsszűrők</div>
    <div id="filter-container"></div>
  </div>

  <!-- ===== FUVAR KÁRTYÁK ===== -->
  <div class="panel">
    <div class="panel-title">📋 Fuvarfeladatok</div>
    <div id="fuvar-list">Betöltés...</div>
  </div>

  <!-- ===== TIMELINE ===== -->
  <div class="panel">
    <div class="panel-title">⏱️ Erőforrás Timeline</div>
    <div id="timeline-container">Betöltés...</div>
  </div>

</div>

<!-- ====================================== -->
<!-- JAVASCRIPT MODULOK -->
<!-- ====================================== -->
<script type="module">

/* ------------------------
   ADAT IMPORTOK
------------------------- */
import { FUVAROK } from "./assets/js/data/fuvarok.js";
import { SOFOROK } from "./assets/js/data/soforok.js";
import { VONTATOK } from "./assets/js/data/vontatok.js";
import { POTKOCSIK } from "./assets/js/data/potkocsik.js";

/* ------------------------
   UI/MATCHING MODULOK
------------------------- */
import { renderTimeline } from "./assets/js/ui/timeline.js";
import { renderFuvarFilters, renderFuvarCards } from "./assets/js/ui/fuvar-panel.js";
import { enableFuvarDrag, enableTimelineDrop } from "./assets/js/ui/dragdrop.js";
import { evaluateAllResources } from "./assets/js/ui/matching.js";

/* ------------------------
   OLDAL BETÖLTÉSE
------------------------- */
window.addEventListener("DOMContentLoaded", () => {

  // FUVAR SZŰRŐK
  renderFuvarFilters("filter-container", (filter) => {
    renderFuvarCards("fuvar-list", filter, onSelectFuvar);
    enableFuvarDrag();
  });

  // ALAPÉRTELMEZETT FUVARLISTA
  renderFuvarCards("fuvar-list", "all", onSelectFuvar);
  enableFuvarDrag();

  // TIMELINE RENDER
  renderTimeline("timeline-container", [
    { icon: "👤", name: "Sofőrök",    list: SOFOROK },
    { icon: "🚛", name: "Vontatók",   list: VONTATOK },
    { icon: "🚚", name: "Pótkocsik",  list: POTKOCSIK }
  ]);
  enableTimelineDrop();

  console.log("Fuvarszervezés v4.4 (Advanced) betöltve.");
});

/* ==========================================================
   FUVAR KIJELÖLÉS → MATCHING ENGINE FUTTATÁSA
========================================================== */
function onSelectFuvar(results) {

  console.log("Matching eredmények:", results);

  // Minden erőforrásra rögzítjük a matchGrade értéket (timeline highlight miatt)
  SOFOROK.forEach((s) => {
    const r = results.soforok.find(x => x.id === s.id);
    s.matchGrade = r.result.grade;
  });

  VONTATOK.forEach((v) => {
    const r = results.vontatok.find(x => x.id === v.id);
    v.matchGrade = r.result.grade;
  });

  POTKOCSIK.forEach((p) => {
    const r = results.potkocsik.find(x => x.id === p.id);
    p.matchGrade = r.result.grade;
  });

  // TIMELINE újrarender matching highlight-tal
  renderTimeline("timeline-container", [
    { icon: "👤", name: "Sofőrök",    list: SOFOROK },
    { icon: "🚛", name: "Vontatók",   list: VONTATOK },
    { icon: "🚚", name: "Pótkocsik",  list: POTKOCSIK }
  ]);

  enableTimelineDrop();
}

</script>

</body>
</html>
